<script type="module">

const db=getFirestore(initializeApp(FB));
const COLL="sales", COLL_FWD="fwd_sales";

// ── FWD Future First commission table (Year 1 %) by term ──
const FWD_RATES={
  5:{y1:30,y2:16,y3:5.5,y4:2.2,y5:1,y6:0},
  6:{y1:35,y2:18.5,y3:6,y4:2.2,y5:1,y6:1},

  23:{y1:72.5,y2:37.7,y3:12.3,y4:6,y5:2.6,y6:2.6},
  24:{y1:73.5,y2:37.8,y3:12.4,y4:6.3,y5:2.6,y6:2.6},
  25:{y1:74,y2:38,y3:12.5,y4:6.5,y5:2.6,y6:2.6}
};
function getFWDRate(term){
  const t=Math.max(5,Math.min(parseInt(term)||5,25));
  return FWD_RATES[t]||FWD_RATES[5];
}

// ── CORRECTED FWD commission formula: AP × commRate% × 0.8 × bending ──
// Income keeps 20% of FWD commissions, so you receive 80% (0.8 multiplier)
function calcFWDComm(ap, termRate, bendFactor){
  return ap * (termRate/100) * 0.8 * bendFactor;
}

// ── Bending factor based on PREVIOUS quarter Income credits ──
function getBending(saleDate,allSales){
  const dt=new Date(saleDate+"T00:00:00");
  const yr=dt.getFullYear(),mo=dt.getMonth();
  let pqMos,pqYr=yr;
  if(mo<=2){pqMos=[9,10,11];pqYr=yr-1;}
  else if(mo<=5){pqMos=[0,1,2];}
  else if(mo<=8){pqMos=[3,4,5];}
  else{pqMos=[6,7,8];}
  const pqCredits=allSales
    .filter(s=>{
      const sd=new Date(s.date+"T00:00:00");
      return sd.getFullYear()===pqYr&&pqMos.includes(sd.getMonth())&&s.company!=="FWD";
    })
    .reduce((a,s)=>a+(s.totalCredit||0),0);
  let factor=0.7,label="Base (0.70)",tier="base";
  if(pqCredits>=140000){factor=0.8;label="High (0.80)";tier="high";}
  else if(pqCredits>=97000){factor=0.75;label="Mid (0.75)";tier="mid";}
  return{factor,label,tier,credits:pqCredits};
}

// Live recalculate a stored FWD sale using latest sales data
function liveFWDComm(s){
  const bend=getBending(s.date,sales);
  const rate=getFWDRate(s.term);
  const commission=calcFWDComm(s.annualPremium,rate.y1,bend.factor);
  return{commission,commRate:rate.y1,bendFactor:bend.factor,bendLabel:bend.label,bendTier:bend.tier,bendCredits:bend.credits};
}

// ── FWD Payout: sold in Month X → paid in Month X+1 ──
const MTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MTHS_S=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getFWDPayoutMo(saleDate){
  // Simple rule: submission month + 1 = payout month
  const dt=new Date(saleDate+"T00:00:00");
  const payMo=(dt.getMonth()+1)%12;
  const payYr=dt.getMonth()===11?dt.getFullYear()+1:dt.getFullYear();
  return{mo:payMo,yr:payYr,label:MTHS_S[payMo]+" "+payYr};
}

// For display on saved sales
function getFWDPayoutLabel(saleDate){
  return getFWDPayoutMo(saleDate).label;
}

// ── Income Payout: policy incepted Month X → paid Month X+1 ──
// We use the sale date as the inception month approximation
function getIncomePayoutMo(saleDate){
  const dt=new Date(saleDate+"T00:00:00");
  const payMo=(dt.getMonth()+1)%12;
  const payYr=dt.getMonth()===11?dt.getFullYear()+1:dt.getFullYear();
  return{mo:payMo,yr:payYr};
}

// Quarterly bonus months: Jan(Q4 bonus), Apr(Q1 bonus), Jul(Q2 bonus), Oct(Q3 bonus)
const BONUS_MONTHS=[0,3,6,9]; // 0=Jan,3=Apr,6=Jul,9=Oct
const BONUS_LABELS={0:"Q4 Bonus",3:"Q1 Bonus",6:"Q2 Bonus",9:"Q3 Bonus"};
// Which quarter's sales feed which bonus month
// Q4(Oct-Dec) → Jan, Q1(Jan-Mar) → Apr, Q2(Apr-Jun) → Jul, Q3(Jul-Sep) → Oct
function getBonusQtrForMonth(bonusMo){
  if(bonusMo===0)return{q:"Q4",months:[9,10,11],yr:-1}; // prev year Q4
  if(bonusMo===3)return{q:"Q1",months:[0,1,2],yr:0};
  if(bonusMo===6)return{q:"Q2",months:[3,4,5],yr:0};
  if(bonusMo===9)return{q:"Q3",months:[6,7,8],yr:0};
  return null;
}

// ── Helpers ──
const $f=v=>"$"+Number(v||0).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const $c=v=>Number(v||0).toLocaleString("en-SG",{maximumFractionDigits:0});
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const todayStr=()=>new Date().toISOString().slice(0,10);
function getQ(mo){if(mo<=2)return"Q1";if(mo<=5)return"Q2";if(mo<=8)return"Q3";return"Q4";}
const QS={"Q1":[0,1,2],"Q2":[3,4,5],"Q3":[6,7,8],"Q4":[9,10,11]};

// ── State ──
let sales=[],fwdSales=[],tab="log",calOpen=false,calY=new Date().getFullYear(),calM=new Date().getMonth(),fDate=todayStr();

// ── Calendar builder ──
function buildCal(prefix){
  const dateVal=prefix==="fwd"?fwdForm.date:fDate;
  const open=prefix==="fwd"?fwdForm.calOpen:calOpen;
  const cY=prefix==="fwd"?fwdForm.calY:calY;
  const cM=prefix==="fwd"?fwdForm.calM:calM;
  const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const firstDay=new Date(cY,cM,1).getDay();
  const daysInMonth=new Date(cY,cM+1,0).getDate();
  const todayD=new Date();
  let cells="";
  for(let i=0;i<firstDay;i++)cells+=`<button class='cal-day empty'></button>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=cY+"-"+String(cM+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const isTod=todayD.getFullYear()===cY&&todayD.getMonth()===cM&&todayD.getDate()===d;
    const isSel=dateVal===ds;
    const fn=prefix==="fwd"?`fwdPickDay(${d})`:`pickDay(${d})`;
    cells+=`<button class='cal-day${isTod?" today":""}${isSel?" selected":""}' onclick='${fn}'>${d}</button>`;
  }
  const navFn=prefix==="fwd"?["fwdNavM(-1)","fwdNavM(1)","fwdJumpY"]:["navM(-1)","navM(1)","jumpY"];
  const todFn=prefix==="fwd"?"fwdPickToday()":"pickToday()";
  const yOpts=[];for(let y=todayD.getFullYear()+1;y>=todayD.getFullYear()-5;y--)yOpts.push(`<option value="${y}"${cY===y?" selected":""}>${y}</option>`);
  const calHtml=open?`<div class='cal-pop'><div class='cal-nav'><button class='cal-nb' onclick='${navFn[0]}'>‹</button><div><select class='cal-ysel' onchange='${navFn[2]}(parseInt(this.value))'>${yOpts.join("")}</select> <span style='color:#e2e8f0;font-weight:700;'>${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][cM]}</span></div><button class='cal-nb' onclick='${navFn[1]}'>›</button></div><div class='cal-dh'>${DAYS.map(d=>`<span>${d}</span>`).join("")}</div><div class='cal-days'>${cells}</div><button class='cal-tod' onclick='${todFn}'>Today</button></div>`:"";
  const openFn=prefix==="fwd"?`fwdTogCal()`:`togCal()`;
  return`<div class='cal-wrap'><div class='cal-row'><input class='inp' type='text' style='flex:1;' placeholder='YYYY-MM-DD' value='${esc(dateVal)}' id='${prefix==="fwd"?"fwdDateInp":"dateInp"}'/><button class='cal-ico${open?" open":""}' onclick='${openFn}'>📅</button></div>${calHtml}</div>`;
}

function getCommRates(productName,termPt){
  const p=FLAT_PRODUCTS.find(x=>x.name===productName);
  if(!p)return null;
  if(p.rates.length===1)return{...p.rates[0],sc:p.sc};
  const r=p.rates.find(x=>x.pt===termPt)||p.rates[0];
  return{...r,sc:p.sc};
}
function getSC(productName){
  const p=FLAT_PRODUCTS.find(x=>x.name===productName);
  return p?p.sc:0;
}

function renderSrchList(pid,q){
  if(!q||q.length<1)return Object.entries(PRODUCTS).map(([cat,arr])=>`<div class='srch-cat ${cat==="Traditional Life Insurance"?"cat-trad":cat==="Investment Linked Insurance"?"cat-ilp":"cat-health"}'>${cat}</div>`+arr.map(p=>`<div class='srch-item' onclick='pickProd("${pid}","${p.name.replace(/'/g,"\\'")}")'>${p.name}</div>`).join("")).join("");
  const results=FLAT_PRODUCTS.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  if(!results.length)return`<div style='padding:12px;color:#64748b;font-size:13px;'>No products found</div>`;
  return results.map(p=>`<div class='srch-item' onclick='pickProd("${pid}","${p.name.replace(/'/g,"\\'")}")'><span style='font-size:10px;color:#64748b;'>${p.cat} · </span>${p.name}</div>`).join("");
}

function renderPolPreview(pol){
  if(!pol.product||!pol.annualPremium)return"";
  const ap=parseFloat(pol.annualPremium)||0;
  const cr=getCommRates(pol.product,pol.term);
  if(!cr)return"";
  const comm=ap*(cr.y1/100);
  const credit=ap*(cr.sc/100);
  let rComm=0,rCredit=0;
  (pol.riders||[]).forEach(r=>{
    if(r.name&&r.premium){
      const rd=RIDERS.find(x=>x.name===r.name);
      if(rd){rComm+=(parseFloat(r.premium)||0)*(rd.y1/100);rCredit+=(parseFloat(r.premium)||0)*(rd.sc/100);}
    }
  });
  return`<div class='prev-box'><div style='font-size:11px;color:#60a5fa;font-weight:700;margin-bottom:6px;'>⚡ Preview</div>
    <div class='g3'>
      <div class='mc'><div class='ml'>Year 1 Comm</div><div class='mv' style='color:#34d399;'>${$f(comm+rComm)}</div></div>
      <div class='mc'><div class='ml'>Sales Credits</div><div class='mv' style='color:#60a5fa;'>${$c(credit+rCredit)} pts</div></div>
      <div class='mc'><div class='ml'>Comm %</div><div class='mv'>${cr.y1}%</div></div>
    </div></div>`;
}

// ── Income Payout Timeline Tab (new section in Dashboard or separate) ──
// We'll add this to the Dashboard tab as a section below the stats
// Actually, let's make it a standalone visible section accessible from the FWD tab switcher
// Per your request, add income payout timeline to show monthly income commissions
// We'll inject it into the dashboard

function renderIncomeTimeline(){
  // Build month-by-month: income commission payout = sale month + 1
  // Group sales by their PAYOUT month (inception month + 1)
  const allIncSales=sales.filter(s=>s.date&&s.date.startsWith(String(selYear)));
  // Also need prev year Q4 sales for Jan bonus
  const prevYrQ4=sales.filter(s=>{
    if(!s.date)return false;
    const yr=parseInt(s.date.slice(0,4));
    const mo=parseInt(s.date.slice(5,7))-1;
    return yr===selYear-1&&mo>=9&&mo<=11;
  });

  // Monthly commission payouts (sale incepted in month X → paid in month X+1)
  const payMap={};
  for(let i=0;i<12;i++)payMap[i]={comm:0,count:0,sales:[]};

  allIncSales.forEach(s=>{
    const {mo,yr}=getIncomePayoutMo(s.date);
    if(yr===selYear&&mo>=0&&mo<12){
      payMap[mo].comm+=(s.totalComm||0);
      payMap[mo].count++;
      payMap[mo].sales.push(s);
    }
  });

  // Quarterly bonuses — estimate based on credits
  // Bonus tiers (from previous chats): 
  // <97k = no bonus, 97k-139k = 30% bonus, 140k+ = 40% bonus
  // We show estimated bonus in the bonus months
  const bonusMap={};
  BONUS_MONTHS.forEach(bonusMo=>{
    const bqInfo=getBonusQtrForMonth(bonusMo);
    if(!bqInfo)return;
    let qSales;
    if(bonusMo===0){
      // Q4 bonus in Jan = based on Q4 of PREVIOUS year
      qSales=prevYrQ4;
    } else {
      qSales=allIncSales.filter(s=>{
        const mo=parseInt(s.date.slice(5,7))-1;
        return bqInfo.months.includes(mo);
      });
    }
    const qCredits=qSales.reduce((a,s)=>a+(s.totalCredit||0),0);
    const qBaseComm=qSales.reduce((a,s)=>a+(s.totalComm||0),0);
    let bonusPct=0;
    if(qCredits>=140000)bonusPct=40;
    else if(qCredits>=97000)bonusPct=30;
    const bonusAmt=qBaseComm*(bonusPct/100);
    bonusMap[bonusMo]={bonusPct,bonusAmt,qCredits,qLabel:bqInfo.q,qBaseComm};
  });

  const timelineHtml=`
    <div style='font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:6px;'>📅 ${selYear} Income Payout Timeline</div>
    <div style='font-size:11px;color:#475569;margin-bottom:8px;'>Commission received the month after policy incepts · Bonus months highlighted in gold</div>
    <div class='inc-timeline-grid'>
    ${MTHS_S.map((m,i)=>{
      const hasPay=payMap[i].comm>0;
      const hasBonus=BONUS_MONTHS.includes(i)&&(bonusMap[i]?.bonusAmt||0)>0;
      const isActive=incSelMonth===i;
      const total=payMap[i].comm+(bonusMap[i]?.bonusAmt||0);
      return `<div class='inc-month-card${hasPay?" has-inc":""}${hasBonus?" has-bonus":""}${isActive?" active-inc":""}' onclick='incSelMo(${i})'>
        <div class='inc-month-card-lbl'>${m}${hasBonus?" ⭐":""}</div>
        <div class='inc-month-card-amt' style='color:${total>0?(hasBonus?"#fbbf24":"#93c5fd"):"#334155"};'>${total>0?$f(total):"—"}</div>
        ${total>0?`<div style='font-size:10px;color:#475569;margin-top:2px;'>${payMap[i].count} sale${payMap[i].count!==1?"s":""}</div>`:""}
      </div>`;
    }).join("")}
    </div>`;

  let detailHtml="";
  if(incSelMonth!==null){
    const mo=incSelMonth;
    const mData=payMap[mo];
    const bData=bonusMap[mo];
    const hasBonus=BONUS_MONTHS.includes(mo)&&(bData?.bonusAmt||0)>0;
    const total=mData.comm+(bData?.bonusAmt||0);

    detailHtml=`<div class='inc-month-detail'>
      <div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;'>
        <div style='font-size:14px;font-weight:700;color:#60a5fa;'>💰 ${MTHS[mo]} ${selYear} Income Payout</div>
        <div style='font-size:18px;font-weight:900;color:${hasBonus?"#fbbf24":"#60a5fa"};'>${$f(total)}</div>
      </div>

      <!-- Commission from sales -->
      ${mData.sales.length>0?`
        <div style='font-size:12px;font-weight:700;color:#93c5fd;margin-bottom:6px;'>From policies incepted in ${MTHS[(mo+11)%12]}:</div>
        ${mData.sales.map(s=>{
          const soldDt=new Date(s.date+"T00:00:00").toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"numeric"});
          return `<div style='background:#0a1929;border-radius:8px;padding:10px 12px;border:1px solid #1e40af;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;'>
            <div>
              <div style='font-weight:700;font-size:13px;'>${esc(s.clientName)}</div>
              <div style='font-size:11px;color:#64748b;'>${soldDt} · ${(s.policies||[]).length} polic${(s.policies||[]).length===1?"y":"ies"}</div>
            </div>
            <div style='font-weight:800;color:#60a5fa;'>${$f(s.totalComm||0)}</div>
          </div>`;
        }).join("")}
        <div style='background:#0f1e3d;border-radius:6px;padding:8px 12px;display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:${hasBonus?"12px":"0"};'>
          <span style='color:#93c5fd;'>Subtotal (commissions)</span>
          <span style='color:#60a5fa;'>${$f(mData.comm)}</span>
        </div>
      `:`<div style='font-size:13px;color:#475569;margin-bottom:${hasBonus?"12px":"0"};'>No commissions expected in ${MTHS[mo]}.</div>`}

      <!-- Bonus section -->
      ${hasBonus&&bData?`
        <div class='bonus-divider'>
          <div class='bonus-divider-line'></div>
          <div class='bonus-divider-lbl'>⭐ ${bData.qLabel} Bonus</div>
          <div class='bonus-divider-line'></div>
        </div>
        <div style='background:#1a1200;border-radius:8px;padding:10px 12px;border:1px solid #d97706;margin-bottom:8px;'>
          <div style='display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;'>
            <div>
              <div style='font-size:12px;font-weight:700;color:#fde68a;'>${bData.qLabel} Bonus (${bData.bonusPct}% of base)</div>
              <div style='font-size:11px;color:#64748b;margin-top:2px;'>${$c(bData.qCredits)} credits · Base comm: ${$f(bData.qBaseComm)}</div>
            </div>
            <div style='font-weight:800;color:#fbbf24;font-size:16px;'>${$f(bData.bonusAmt)}</div>
          </div>
        </div>
        <div style='background:#1f1500;border-radius:6px;padding:8px 12px;display:flex;justify-content:space-between;font-size:13px;font-weight:700;border:1px solid #f59e0b;'>
          <span style='color:#fde68a;'>🎉 Total for ${MTHS[mo]}</span>
          <span style='color:#fbbf24;'>${$f(total)}</span>
        </div>
      `:""}

      ${!hasBonus&&mData.sales.length===0?`<div style='font-size:13px;color:#475569;text-align:center;padding:8px 0;'>No expected payouts in ${MTHS[mo]}.</div>`:""}
    </div>`;
  }

  return`<div style='margin-top:20px;border-top:1px solid #334155;padding-top:20px;'>
    ${timelineHtml}
    ${detailHtml}
  </div>`;
}

// ── Attach event listeners (called after every render) ──
function attachListeners(){
  // Income log tab listeners
  const cli=document.getElementById("clientInp");
  if(cli)cli.addEventListener("input",e=>{fClient=e.target.value;});
  const dInp=document.getElementById("dateInp");
  if(dInp)dInp.addEventListener("input",e=>{fDate=e.target.value;if(/^\d{4}-\d{2}-\d{2}$/.test(fDate)){const dt=new Date(fDate+"T00:00:00");if(!isNaN(dt)){calY=dt.getFullYear();calM=dt.getMonth();}}});

  // FWD tab listeners — these are the key ones preventing cursor jump
  const fwdCli=document.getElementById("fwdClientInp");
  if(fwdCli)fwdCli.addEventListener("input",e=>{fwdForm.client=e.target.value;});
  const fwdAp=document.getElementById("fwdApInp");
  if(fwdAp)fwdAp.addEventListener("input",e=>{fwdForm.ap=e.target.value;updateFWDPreview();});
  const fwdCalIco=document.querySelector(".fwd-card .cal-ico");
  if(fwdCalIco)fwdCalIco.addEventListener("click",e=>{e.stopPropagation();fwdForm.calOpen=!fwdForm.calOpen;if(fwdForm.calOpen&&fwdForm.date){fwdForm.calY=parseInt(fwdForm.date.split("-")[0]);fwdForm.calM=parseInt(fwdForm.date.split("-")[1])-1;}renderPage();});
  const fwdDateInp=document.getElementById("fwdDateInp");
  if(fwdDateInp)fwdDateInp.addEventListener("input",e=>{fwdForm.date=e.target.value;if(/^\d{4}-\d{2}-\d{2}$/.test(fwdForm.date)){const dt=new Date(fwdForm.date+"T00:00:00");if(!isNaN(dt)){fwdForm.calY=dt.getFullYear();fwdForm.calM=dt.getMonth();}}updateFWDPreview();});

  // Close calendars on outside click
  document.addEventListener("click",e=>{
    const calEl=document.querySelector(".cal-pop");
    if(calEl&&!calEl.closest(".cal-wrap").contains(e.target)){
      if(tab==="fwd"&&fwdForm.calOpen){fwdForm.calOpen=false;renderPage();}
      else if(calOpen){calOpen=false;renderPage();}
    }
    if(fwdForm.calOpen){const cw=document.querySelector(".fwd-card .cal-wrap");if(cw&&!cw.contains(e.target)){fwdForm.calOpen=false;renderPage();}}
  },{once:true});
}

// ── Update FWD preview WITHOUT re-rendering whole page ──
function updateFWDPreview(){
  const ap=parseFloat(fwdForm.ap)||0;
  const termVal=parseInt(fwdForm.term)||0;
  const prev=document.getElementById("fwdPreview");
  if(!prev)return;
  if(ap>0&&termVal>=5){
    const rate=getFWDRate(termVal);
    const bend=getBending(fwdForm.date,sales);
    const comm=calcFWDComm(ap,rate.y1,bend.factor);
    const bendCls=bend.tier==="high"?"bend-high":bend.tier==="mid"?"bend-mid":"bend-base";
    const payLbl=getFWDPayoutLabel(fwdForm.date);
    prev.innerHTML=`<div style='font-size:11px;color:#34d399;font-weight:700;margin-bottom:8px;'>⚡ Preview</div>
      <div class='g3' style='margin-bottom:8px;'>
        <div class='mc'><div class='ml'>Year 1 Comm %</div><div class='mv' style='color:#34d399;'>${rate.y1}%</div></div>
        <div class='mc'><div class='ml'>Bending Factor</div><div class='mv'><span class='bending-badge ${bendCls}'>${bend.label}</span></div></div>
        <div class='mc'><div class='ml'>Est. Commission</div><div class='mv' style='color:#34d399;font-size:15px;'>${$f(comm)}</div></div>
      </div>
      <div style='font-size:11px;color:#475569;'>
        Formula: ${$f(ap)} × ${rate.y1}% × 0.8 × ${bend.factor} = <strong style='color:#34d399;'>${$f(comm)}</strong><br/>
        Payout month: <span style='color:#34d399;font-weight:600;'>${payLbl}</span>
      </div>`;
  } else {
    prev.innerHTML="";
  }
}

function flashField(el){if(el){el.classList.add("field-error");setTimeout(()=>el.classList.remove("field-error"),2000);}}

window.doAddSale=async()=>{
  const cli=document.getElementById("clientInp");if(cli)fClient=cli.value.trim();
  let hasErr=false;
  if(!fClient){flashField(document.getElementById("clientInp"));hasErr=true;}
  if(!fDate){hasErr=true;}
  pols.forEach(pol=>{
    const apEl=document.getElementById("ap_"+pol.id);
    if(apEl)pol.annualPremium=apEl.value;
    if(!pol.product){hasErr=true;}
    if(!pol.annualPremium||parseFloat(pol.annualPremium)<=0){flashField(document.getElementById("ap_"+pol.id));hasErr=true;}
  });
  if(hasErr){const err=document.getElementById("valErr");if(err){err.classList.add("show");setTimeout(()=>err.classList.remove("show"),3500);}return;}
  const mo=new Date(fDate+"T00:00:00").getMonth();
  let totalComm=0,totalCredit=0;
  const polsData=pols.map(pol=>{
    const ap=parseFloat(pol.annualPremium)||0;
    const cr=getCommRates(pol.product,pol.term)||{y1:0,sc:0};
    const comm=ap*(cr.y1/100);
    const credit=ap*(cr.sc/100);
    const riderData=(pol.riders||[]).filter(r=>r.name&&r.premium).map(r=>{
      const rd=RIDERS.find(x=>x.name===r.name)||{y1:0,sc:0};
      const rp=parseFloat(r.premium)||0;
      return{name:r.name,premium:rp,comm:rp*(rd.y1/100),credit:rp*(rd.sc/100)};
    });
    const rComm=riderData.reduce((a,r)=>a+r.comm,0);
    const rCredit=riderData.reduce((a,r)=>a+r.credit,0);
    totalComm+=comm+rComm;
    totalCredit+=credit+rCredit;
    return{product:pol.product,term:pol.term,annualPremium:ap,totalComm:comm+rComm,totalCredit:credit+rCredit,riders:riderData};
  });
  const obj={date:fDate,clientName:fClient,policies:polsData,totalComm,totalCredit,quarter:getQ(mo),month:mo,company:"Income"};
  await addSaleDB(obj);
  launchConfetti();
  fClient="";pols=[newPol()];srch={};tab="dashboard";renderAll();
};

window.doAddFWDSale=async()=>{
  const cli=document.getElementById("fwdClientInp");if(cli)fwdForm.client=cli.value.trim();
  const apEl=document.getElementById("fwdApInp");if(apEl)fwdForm.ap=apEl.value;

  if(!fwdForm.client){flashField(document.getElementById("fwdClientInp"));hasErr=true;}

  const ap=parseFloat(fwdForm.ap);
  const termNum=parseInt(fwdForm.term);
  const rate=getFWDRate(termNum);
  const bend=getBending(fwdForm.date,sales);
  // CORRECTED FORMULA: AP × commRate% × 0.8 × bending

};

// Confetti
function launchConfetti(){
  const canvas=document.createElement("canvas");
  canvas.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;";
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20,r:Math.random()*8+4,c:`hsl(${Math.random()*360},90%,60%)`,vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,va:(Math.random()-0.5)*0.2,a:Math.random()*Math.PI*2}));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();});
    frame++;
    if(frame<150)requestAnimationFrame(draw);else document.body.removeChild(canvas);
  }
  draw();
}
